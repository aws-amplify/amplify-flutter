# Generated with aft. To update, run: `aft generate workflows`
name: amplify_push
on:
  push:
    branches:
      - main
      - stable
    paths:
      - '.github/workflows/amplify_push.yaml'
      - '.github/workflows/flutter_vm.yaml'
      - 'packages/amplify_foundation/amplify_foundation_dart/lib/**/*.dart'
      - 'packages/amplify_foundation/amplify_foundation_dart/pubspec.yaml'
      - 'packages/amplify_lints/lib/**/*.yaml'
      - 'packages/amplify_lints/pubspec.yaml'
      - 'packages/amplify_push/**/*.dart'
      - 'packages/amplify_push/**/*.yaml'
      - 'packages/amplify_push/lib/**/*'
      - 'packages/amplify_push/test/**/*'
  pull_request:
    paths:
      - '.github/workflows/amplify_push.yaml'
      - '.github/workflows/flutter_vm.yaml'
      - 'packages/amplify_foundation/amplify_foundation_dart/lib/**/*.dart'
      - 'packages/amplify_foundation/amplify_foundation_dart/pubspec.yaml'
      - 'packages/amplify_lints/lib/**/*.yaml'
      - 'packages/amplify_lints/pubspec.yaml'
      - 'packages/amplify_push/**/*.dart'
      - 'packages/amplify_push/**/*.yaml'
      - 'packages/amplify_push/lib/**/*'
      - 'packages/amplify_push/test/**/*'

# These permissions are needed to interact with GitHub's OIDC Token endpoint.
permissions:
  id-token: write
  contents: read

# Cancels in-progress job when there is another push to same ref.
# https://docs.github.com/en/actions/using-jobs/using-concurrency#example-only-cancel-in-progress-jobs-or-runs-for-the-current-workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: ./.github/workflows/flutter_vm.yaml
    secrets: inherit
    with:
      package-name: amplify_push
      working-directory: packages/amplify_push
      has-goldens: false
