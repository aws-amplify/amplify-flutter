name: E2E (Web)
on:
  workflow_call:
    inputs:
      working-directory:
        description: The working directory relative to the repo root
        required: true
        type: string
      package-name:
        description: The name of the package being tested
        required: true
        type: string
      needs-aws-config:
        description: Whether the E2E workflow needs configuration pulled from AWS
        required: true
        type: boolean
      run-wasm:
        description: >-
          Whether to additionally run the E2E suite compiled to WebAssembly.
          Opted into by packages whose test package has a
          `test/wasm_smoke_test.dart`; defaults to off.
        required: false
        default: false
        type: boolean

jobs:
  e2e-test-web:
    name: e2e-test-web (${{ matrix.compiler }}, ${{ matrix.channel }})
    runs-on: ubuntu-latest
    strategy:
      # Allows other matrix items to run if one fails
      fail-fast: false
      matrix:
        channel:
          - beta
          - stable
        compiler:
          - js
          - wasm
        # Skips e2e tests against beta on PRs, and skips the wasm compiler
        # unless the caller opted in via `run-wasm`.
        exclude:
          - channel: ${{ (github.event_name == 'pull_request' && 'beta') || 'NONE' }}
          - compiler: ${{ inputs.run-wasm && 'NONE' || 'wasm' }}

    # These permissions are needed to interact with GitHub's OIDC Token endpoint.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # 7.0.1
        with:
          persist-credentials: false
          submodules: true

      - name: Install dependencies
        uses: ./.github/composite_actions/install_dependencies
        with:
          channel: ${{ matrix.channel }}

      - name: Pub Upgrade
        run: aft exec --include=${{ inputs.package-name }} -- flutter pub upgrade

      - name: Fetch Amplify backend configurations
        if: inputs.needs-aws-config
        uses: ./.github/composite_actions/fetch_backends
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
          scope: ${{ inputs.package-name }}
          secret-identifier: ${{ secrets.AWS_SECRET_IDENTIFIER }}

      - uses: ./.github/composite_actions/setup_chromedriver

      - name: Run integration tests
        timeout-minutes: 320
        env:
          # Appends `--wasm` to the flutter drive runs on the wasm matrix leg.
          WASM_FLAG: ${{ matrix.compiler == 'wasm' && '--wasm' || '' }}
        run: |
          # 5 attemps
          # 60 minutes timeout each
          chromedriver --port=4444 &
          "${{ github.workspace }}/build-support/linux_timeout_attempts.sh" 5 60 "aft exec --include=${{ inputs.package-name }} -- ${{ github.workspace }}/build-support/integ_test.sh -d web-server $WASM_FLAG"

      - name: Log success/failure
        if: always()
        uses: ./.github/composite_actions/log_cw_metric_wrapper
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

          job-status: ${{ job.status }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

          test-type: e2e
          working-directory: ${{ inputs.working-directory }}

          framework: flutter

          platform: web
