name: E2E (Web)
on:
  workflow_call:
    inputs:
      working-directory:
        description: The working directory relative to the repo root
        required: true
        type: string
      package-name:
        description: The name of the package being tested
        required: true
        type: string
      needs-aws-config:
        description: Whether the E2E workflow needs configuration pulled from AWS
        required: true
        type: boolean

jobs:
  e2e-test-web:
    runs-on: ubuntu-latest
    strategy:
      # Allows other matrix items to run if one fails
      fail-fast: false
      matrix:
        channel:
          - beta
          - stable
        # Skips e2e tests against beta on PRs
        exclude:
          - channel: ${{ (github.event_name == 'pull_request' && 'beta') || 'NONE' }}

    # These permissions are needed to interact with GitHub's OIDC Token endpoint.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          persist-credentials: false
          submodules: true

      - name: Install dependencies
        uses: ./.github/composite_actions/install_dependencies
        with:
          channel: ${{ matrix.channel }}
          # Pin the stable web e2e to 3.41.9: the newest stable Flutter that does not
          # exhibit the web focus-traversal regression (flutter/flutter#178109) that
          # crashes these tests on 3.44.x with "Cannot get renderObject of inactive
          # element" via didChangeViewFocus -> findFirstFocus. 3.41.9 is the newest
          # buildable version (repo requires Dart ^3.10.0 / Flutter >=3.38.1) for which
          # the crash was reported non-reproducible. Beta is left unpinned so the beta
          # canary keeps testing the latest channel build.
          flutter-version: ${{ matrix.channel == 'stable' && '3.41.9' || '' }}

      - name: Pub Upgrade
        run: aft exec --include=${{ inputs.package-name }} -- flutter pub upgrade

      - name: Fetch Amplify backend configurations
        if: inputs.needs-aws-config
        uses: ./.github/composite_actions/fetch_backends
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
          scope: ${{ inputs.package-name }}
          secret-identifier: ${{ secrets.AWS_SECRET_IDENTIFIER }}

      - uses: ./.github/composite_actions/setup_chromedriver

      - name: Run integration tests
        timeout-minutes: 320
        run: |
          # 5 attemps
          # 60 minutes timeout each
          chromedriver --port=4444 &
          "${{ github.workspace }}/build-support/linux_timeout_attempts.sh" 5 60 "aft exec --include=${{ inputs.package-name }} -- ${{ github.workspace }}/build-support/integ_test.sh -d web-server"

      - name: Log success/failure
        if: always()
        uses: ./.github/composite_actions/log_cw_metric_wrapper
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

          job-status: ${{ job.status }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

          test-type: e2e
          working-directory: ${{ inputs.working-directory }}

          framework: flutter

          platform: web
