name: aft
on:
  push:
    branches:
      - main
      - stable
    paths:
      - "packages/aft/**/*.dart"
  pull_request:
    paths:
      - "packages/aft/**/*.dart"
  schedule:
    - cron: "0 0 * * 0" # Every Sunday at 00:00
defaults:
  run:
    shell: bash
permissions: read-all

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          submodules: true

      # Needed for `git` but only ever used locally.
      - name: Git Config
        run: |
          git config --global user.email "amplify-flutter@amazon.com"
          git config --global user.name "Amplify Flutter"

      - name: Setup Dart
        uses: dart-lang/setup-dart@21e68f4d54916e6c2f68f8c290b2aed9b02cbd3e # main
        with:
          sdk: stable

      - name: Get Packages
        working-directory: packages/aft
        run: dart pub upgrade

      - name: Save Repo State
        working-directory: packages/aft
        run: |
          dart pub get
          dart bin/aft.dart save-repo-state

      - name: Run Tests
        working-directory: packages/aft
        run: dart test
