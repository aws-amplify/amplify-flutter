name: aft
on:
  push:
    branches:
      - main
      - stable
    paths:
      - "packages/aft/**/*.dart"
  pull_request:
    paths:
      - "packages/aft/**/*.dart"
  schedule:
    - cron: "0 0 * * 0" # Every Sunday at 00:00
defaults:
  run:
    shell: bash
permissions: read-all

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          submodules: true

      # Needed for `git` but only ever used locally.
      - name: Git Config
        run: |
          git config --global user.email "amplify-flutter@amazon.com"
          git config --global user.name "Amplify Flutter"

      - name: Setup Dart
        uses: dart-lang/setup-dart@2bd11704788983a6a210731656d0042e2df8b2c1 # main
        with:
          sdk: stable

      - name: Get Packages
        working-directory: packages/aft
        run: dart pub upgrade

      - name: Save Repo State
        working-directory: packages/aft
        run: |
          dart pub get
          dart bin/aft.dart save-repo-state

      - name: Run Tests
        working-directory: packages/aft
        run: dart test
