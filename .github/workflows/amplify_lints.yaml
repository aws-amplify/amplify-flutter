# Generated with aft. To update, run: `aft generate workflows`
name: amplify_lints
on:
  push:
    branches:
      - main
      - stable
    paths:
      - '.github/workflows/amplify_lints.yaml'
      - '.github/workflows/dart_vm.yaml'
      - 'packages/amplify_lints/**/*.dart'
      - 'packages/amplify_lints/**/*.yaml'
      - 'packages/amplify_lints/lib/**/*'
      - 'packages/amplify_lints/test/**/*'
      - 'tool/check_license_headers.dart'
  pull_request:
    paths:
      - '.github/workflows/amplify_lints.yaml'
      - '.github/workflows/dart_vm.yaml'
      - 'packages/amplify_lints/**/*.dart'
      - 'packages/amplify_lints/**/*.yaml'
      - 'packages/amplify_lints/lib/**/*'
      - 'packages/amplify_lints/test/**/*'
      - 'tool/check_license_headers.dart'
  schedule:
    - cron: "0 13 * * 1" # Every Monday at 06:00 PST
  workflow_dispatch:
defaults:
  run:
    shell: bash

# These permissions are needed to interact with GitHub's OIDC Token endpoint.
permissions:
  id-token: write
  contents: read

# Cancels in-progress job when there is another push to same ref.
# https://docs.github.com/en/actions/using-jobs/using-concurrency#example-only-cancel-in-progress-jobs-or-runs-for-the-current-workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: ./.github/workflows/dart_vm.yaml
    secrets: inherit
    with:
      package-name: amplify_lints
      working-directory: packages/amplify_lints
  check-license-headers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Check license headers
        run: dart tool/check_license_headers.dart
