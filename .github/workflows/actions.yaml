name: actions
on:
  push:
    branches:
      - main
      - stable
    paths:
      - "actions/**/*.dart"
      - "actions/**/*.yaml"
      - "actions/**/*.json"
  pull_request:
    paths:
      - "actions/**/*.dart"
      - "actions/**/*.yaml"
      - "actions/**/*.json"
  schedule:
    - cron: "0 0 * * 0" # Every Sunday at 00:00
defaults:
  run:
    shell: bash
permissions: read-all

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0

      - name: Setup Dart
        uses: dart-lang/setup-dart@2bd11704788983a6a210731656d0042e2df8b2c1 # main
        with:
          sdk: 3.10.0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # 4.4.0
        with:
          version: 9

      - name: Setup aft
        shell: bash # Run in bash regardless of platform
        run: dart pub global activate -spath packages/aft

      - name: aft link
        run: aft link

      - name: Get Packages
        working-directory: actions
        run: dart pub get

      - name: Build Actions
        working-directory: actions
        run: dart tool/build.dart

  test_runner:
    name: Test Runner
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0

      - name: Setup Dart
        uses: dart-lang/setup-dart@2bd11704788983a6a210731656d0042e2df8b2c1 # main
        with:
          sdk: 3.10.0

      - name: Setup aft
        shell: bash # Run in bash regardless of platform
        run: dart pub global activate -spath packages/aft

      - name: aft link
        run: aft link

      - name: Get Packages
        working-directory: actions
        run: dart pub get

      - name: Test
        working-directory: actions
        run: dart test -p node

  test_setup_chromedriver:
    name: Test Action (setup_chromedriver)
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-26
          - ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Git Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0

      - name: Test
        uses: ./.github/composite_actions/setup_chromedriver

  test_launch_ios_simulator:
    name: Test Action (launch_ios_simulator)
    # It is recommended that all actions requiring a simulator be run on XL runners
    # since the process of installing new runtimes and building with Xcode can be
    # incredibly slow otherwise.
    runs-on: macos-26-xlarge
    # Timeout as a stop-gap for further investigating. This action should never need more
    # than 30 minutes to do its work (may need to download older simulator runtimes).
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - ios-version: "16.4"
            device: "iPhone 13 Pro Max"
          - ios-version: "26.4"
            device: "iPhone 17 Pro Max"
    steps:
      - name: Git Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0

      - name: Launch iOS simulator
        uses: ./.github/composite_actions/launch_ios_simulator
        with:
          ios-version: ${{ matrix.ios-version }}
          device: ${{ matrix.device }}
          script: echo "Success!"

  test_launch_android_emulator:
    name: Test Action (launch_android_emulator)
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # 5.2.0
        with:
          distribution: "corretto" # Amazon Corretto Build of OpenJDK
          java-version: "17"

      - name: Test
        timeout-minutes: 10
        uses: ./.github/composite_actions/launch_android_emulator
        with:
          script: echo "Success!"
