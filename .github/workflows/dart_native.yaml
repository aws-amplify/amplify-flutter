# Native Test runs code on non-Linux platforms
name: Dart (Native)
on:
  workflow_call:
    inputs:
      package-name:
        description: The name of the package being tested
        required: true
        type: string
      working-directory:
        description: The working directory relative to the repo root
        required: true
        type: string

jobs:
  test-dart-native:
    timeout-minutes: 60
    strategy:
      # Allows other matrix items to run if one fails
      fail-fast: false
      matrix:
        os:
          - macos-26
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Cache Pub dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # 6.1.0
        with:
          path: |
            ~/.pub-cache/hosted
            ~/.pub-cache/git
          key: os:${{ matrix.os }};sdk:stable;packages:${{ inputs.working-directory }}
          restore-keys: |
            os:${{ matrix.os }};sdk:stable;packages:${{ inputs.working-directory }}
            os:${{ matrix.os }};sdk:stable
            os:${{ matrix.os }}

      # Needed on Windows
      - name: Enable Long Git Paths
        run: git config --system core.longpaths true

      - name: Mitigate Windows Network & Disk Bottlenecks
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          # 1. Force disable real-time monitoring for the job duration
          Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue
          # 2. Exclude your exact workspace path from active scans
          Set-MpPreference -ExclusionPath "${{ github.workspace }}" -ErrorAction SilentlyContinue
          # 3. Aggressively lower TCP timed-out port reuse limits (helps local socket recycling)
          Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters' -Name 'TcpTimedWaitDelay' -Value 30 -ErrorAction SilentlyContinue

      - name: Git Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0

      - name: Git Submodules
        run: git submodule update --init

      - name: Setup Dart
        uses: dart-lang/setup-dart@43c102f4dc9b9829c862401f0b64c7c9184eab4e # main
        with:
          sdk: stable

      - name: Setup aft
        shell: bash # Run in bash regardless of platform
        run: dart pub global activate -spath packages/aft

      # This is needed to support running tests which depend on db_common.
      - name: Install SQLite
        if: runner.os == 'Windows'
        run: |
          # Should match `packages/common/amplify_db_common/windows/CMakeLists.txt`
          $uri = "https://www.sqlite.org/2022/sqlite-dll-win64-x64-3400000.zip"
          $outFile = "sqlite.zip"
          $out = ".\sqlite"
          Invoke-WebRequest -Uri $uri -OutFile $outFile
          Expand-Archive -LiteralPath $outFile -DestinationPath $out
          $absoluteOut = Resolve-Path -Path $out
          Add-Content $env:GITHUB_PATH $absoluteOut
          Get-Content $env:GITHUB_PATH

      - name: Bootstrap
        id: bootstrap
        timeout-minutes: 20
        # Example apps aren't needed here, and `--no-example` avoids
        # resolving a Dart package's Flutter example without a Flutter SDK.
        run: aft bootstrap --fail-fast --include=${{ inputs.package-name }} --no-example --verbose

      - name: Setup Package
        if: "always() && steps.bootstrap.conclusion == 'success'"
        shell: bash # Run in bash regardless of platform
        working-directory: ${{ inputs.working-directory }}
        run: |
          if [ -e tool/setup.sh ]; then
            ./tool/setup.sh
          fi

      - name: Run Tests
        if: "always() && steps.bootstrap.conclusion == 'success'"
        run: dart test --exclude-tags=build
        working-directory: ${{ inputs.working-directory }}

      - name: Log success/failure
        if: always()
        uses: ./.github/composite_actions/log_cw_metric_wrapper
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

          job-status: ${{ job.status }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

          test-type: unit
          working-directory: ${{ inputs.working-directory }}

          framework: dart
          flutter-dart-channel: ${{ matrix.sdk }}
          dart-compiler: native
          platform-version: ${{ matrix.os }}
