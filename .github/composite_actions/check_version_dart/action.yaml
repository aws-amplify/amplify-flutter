name: Check version.dart
description: |
  Verifies that lib/src/version.dart is autogenerated: deletes the
  committed file, regenerates it with build_runner (build_version),
  and fails if the result is missing or differs. Skipped when the
  package has no lib/src/version.dart.

inputs:
  working-directory:
    description: The working directory of the package (relative to repo root)
    required: true

runs:
  using: "composite"
  steps:
    - name: Check version.dart is generated
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ ! -f lib/src/version.dart ]; then
          echo "No lib/src/version.dart — skipping"
          exit 0
        fi
        cp lib/src/version.dart "$RUNNER_TEMP/version.dart.orig"
        rm lib/src/version.dart
        # Full build, no --build-filter: build_runner deletes committed
        # generated files as conflicting outputs, so a filtered build would
        # delete sibling *.g.dart files without regenerating them.
        dart run build_runner build --delete-conflicting-outputs || true
        result=0
        if [ ! -f lib/src/version.dart ]; then
          echo "::error::lib/src/version.dart was not regenerated by build_runner. Is 'build_version' configured correctly in dev_dependencies?"
          result=1
        elif ! diff "$RUNNER_TEMP/version.dart.orig" lib/src/version.dart; then
          echo "::error::The committed lib/src/version.dart does not match the generated output. Is 'build_version' used the right way? Run 'dart run build_runner build' and commit the result."
          result=1
        else
          echo "lib/src/version.dart matches the generated output"
        fi
        # Leave the tree exactly as committed for the following steps.
        git checkout -- .
        exit $result
