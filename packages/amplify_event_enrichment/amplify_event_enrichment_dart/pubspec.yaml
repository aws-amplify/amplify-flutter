name: amplify_event_enrichment_dart
description: A Dart-only standalone on-device event enrichment client that collects device/app/session context and produces structured analytics events in Pinpoint-compatible JSON format. For internal use in the amplify_event_enrichment Flutter library.
version: 0.1.0
homepage: https://docs.amplify.aws/lib/q/platform/flutter/
repository: https://github.com/aws-amplify/amplify-flutter/tree/main/packages/amplify_event_enrichment/amplify_event_enrichment_dart
issue_tracker: https://github.com/aws-amplify/amplify-flutter/issues

topics:
  - aws
  - analytics
  - event-enrichment
  - aws-amplify

environment:
  sdk: ^3.10.0

dependencies:
  amplify_foundation_dart: ">=2.11.0 <2.12.0"
  meta: ^1.16.0
  uuid: ^4.5.0

dev_dependencies:
  amplify_lints: ">=3.1.4 <3.2.0"
  fake_async: ^1.3.0
  test: ^1.22.1
