name: amplify_foundation_dart_bridge
description: Bridges V2 (amplify_core/aws_common) credential types to V3 (amplify_foundation_dart) types.
version: 1.0.0
homepage: https://docs.amplify.aws/flutter/
repository: https://github.com/aws-amplify/amplify-flutter/tree/main/packages/amplify_foundation_dart_bridge
issue_tracker: https://github.com/aws-amplify/amplify-flutter/issues

environment:
  sdk: ^3.9.0

dependencies:
  amplify_foundation_dart:
    path: ../amplify_foundation_dart
  aws_common:
    path: ../aws_common

dev_dependencies:
  amplify_lints: ">=3.1.4 <3.2.0"
  test: ^1.22.1
