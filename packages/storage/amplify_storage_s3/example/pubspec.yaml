name: amplify_storage_s3_example
description: Demonstrates how to use the amplify_storage_s3 plugin.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.10.0
  flutter: ">=3.38.1"

dependencies:
  amplify_auth_cognito: any
  amplify_authenticator: any
  amplify_core: any
  amplify_flutter: any
  amplify_secure_storage: any
  amplify_storage_s3: any
  file_picker: ^11.0.0
  flutter:
    sdk: flutter
  go_router: ^6.5.7
  path_provider: ^2.0.11
  web: ^1.1.1

dev_dependencies:
  amplify_integration_test: any
  amplify_lints:
    path: ../../../amplify_lints
  amplify_storage_s3_dart: any
  amplify_test:
    path: ../../../test/amplify_test
  aws_common: any
  drift: ^2.25.0
  flutter_driver:
    sdk: flutter
  flutter_test:
    sdk: flutter
  http: ^1.3.0
  integration_test:
    sdk: flutter
  path: ^1.8.0
  stack_trace: ^1.10.0
  test: ^1.22.1

dependency_overrides:
  # file_picker declares win32 ^5.9.0 but the monorepo requires win32 ^6.1.0
  # (for package_info_plus 10.x). Force the newer win32 used by amplify_secure_storage_dart.
  win32: ^6.1.0

flutter:
  uses-material-design: true
