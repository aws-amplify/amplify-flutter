name: aws_amazon_firehose
description: AWS Amazon Data Firehose client for Dart with offline support, automatic retry, and configurable batching.
version: 0.1.0
repository: https://github.com/aws-amplify/amplify-flutter/tree/main/packages/kinesis/aws_amazon_firehose

environment:
  sdk: ^3.0.0

dependencies:
  amplify_core: ^2.0.0
  aws_common: ^0.7.0
  aws_signature_v4: ^0.6.0
  built_collection: ^5.1.0
  built_value: ^8.8.0
  drift: ^2.14.0
  meta: ^1.9.0
  smithy: ^0.7.0
  smithy_aws: ^0.7.0
  sqlite3_flutter_libs: ^0.5.0

dev_dependencies:
  build_runner: ^2.4.0
  built_value_generator: ^8.8.0
  drift_dev: ^2.14.0
  fake_async: ^1.3.0
  mocktail: ^1.0.0
  test: ^1.24.0

dependency_overrides:
  amplify_core:
    path: ../../amplify_core
  aws_common:
    path: ../../aws_common
  aws_signature_v4:
    path: ../../aws_signature_v4
  smithy:
    path: ../../smithy/smithy
  smithy_aws:
    path: ../../smithy/smithy_aws
