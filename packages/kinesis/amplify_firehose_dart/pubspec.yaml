name: amplify_firehose_dart
description: A Dart-only implementation for streaming data to Amazon Data Firehose with offline support. For internal use in the amplify_firehose Flutter library.
version: 0.1.0
homepage: https://docs.amplify.aws/lib/q/platform/flutter/
repository: https://github.com/aws-amplify/amplify-flutter/tree/main/packages/kinesis/amplify_firehose_dart
issue_tracker: https://github.com/aws-amplify/amplify-flutter/issues

topics:
  - aws
  - firehose
  - streaming
  - analytics
  - aws-amplify

environment:
  sdk: ^3.9.0

dependencies:
  amplify_core: ^2.0.0
  amplify_db_common_dart: ^0.4.0
  amplify_foundation_dart: ^1.0.0
  amplify_foundation_dart_bridge: ^1.0.0
  aws_common: ^0.7.0
  aws_signature_v4: ^0.6.0
  built_collection: ^5.1.0
  built_value: ^8.8.0
  drift: ^2.14.0
  meta: ^1.9.0
  smithy: ^0.7.0
  smithy_aws: ^0.7.0
  web: ^1.1.1

dev_dependencies:
  build_runner: ^2.4.0
  built_value_generator: ^8.8.0
  drift_dev: ^2.14.0
  fake_async: ^1.3.0
  mocktail: ^1.0.0
  test: ^1.24.0
