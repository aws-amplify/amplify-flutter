name: amplify_record_cache_dart
description: Shared record caching infrastructure for Amplify streaming clients (Kinesis Data Streams, Firehose). Provides offline storage, batching, retry logic, and auto-flush scheduling. For internal use.
version: 0.1.0
homepage: https://docs.amplify.aws/lib/q/platform/flutter/
repository: https://github.com/aws-amplify/amplify-flutter/tree/main/packages/kinesis/amplify_record_cache_dart
issue_tracker: https://github.com/aws-amplify/amplify-flutter/issues

environment:
  sdk: ^3.10.0

dependencies:
  amplify_db_common_dart: ">=0.4.17 <0.5.0"
  amplify_foundation_dart: ">=2.11.0 <2.12.0"
  aws_common: ">=0.7.12 <0.8.0"
  drift: ^2.34.0
  meta: ^1.16.0
  smithy: ">=0.7.10 <0.8.0"
  web: ^1.1.1

dev_dependencies:
  amplify_lints: ">=3.1.4 <3.2.0"
  build_runner: ^2.4.15
  drift_dev: ^2.34.0
  fake_async: ^1.3.0
  mocktail: ^1.0.0
  test: ^1.22.1
