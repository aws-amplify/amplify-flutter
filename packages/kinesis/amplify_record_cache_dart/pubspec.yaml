name: amplify_record_cache_dart
description: Shared record caching infrastructure for Amplify streaming clients (Kinesis Data Streams, Firehose). Provides offline storage, batching, retry logic, and auto-flush scheduling.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.9.0

dependencies:
  amplify_foundation_dart: ">=2.11.0 <2.12.0"
  meta: ^1.16.0
  smithy: ">=0.7.10 <0.8.0"

dev_dependencies:
  amplify_lints: ">=3.1.4 <3.2.0"
  fake_async: ^1.3.0
  mocktail: ^1.0.0
  test: ^1.22.1
