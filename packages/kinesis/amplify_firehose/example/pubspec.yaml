name: amplify_firehose_example
description: Example app for amplify_firehose.
publish_to: none

environment:
  sdk: ^3.9.0
  flutter: ">=3.35.0"

dependencies:
  amplify_auth_cognito: ">=2.10.0 <2.11.0"
  amplify_authenticator: ">=2.10.0 <2.11.0"
  amplify_firehose:
    path: ../
  amplify_flutter: ">=2.10.0 <2.11.0"
  amplify_foundation_dart: ">=2.11.0 <2.12.0"
  flutter:
    sdk: flutter

dev_dependencies:
  amplify_lints: ">=3.1.4 <3.2.0"
  amplify_test: ">=0.5.0 <0.6.0"
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
