name: amplify_kinesis_dart
description: A Dart-only implementation for streaming data to Amazon Kinesis Data Streams with offline support. For internal use in the amplify_kinesis Flutter library.
version: 0.1.4
homepage: https://docs.amplify.aws/lib/q/platform/flutter/
repository: https://github.com/aws-amplify/amplify-flutter/tree/main/packages/kinesis/amplify_kinesis_dart
issue_tracker: https://github.com/aws-amplify/amplify-flutter/issues

topics:
  - aws
  - kinesis
  - streaming
  - analytics
  - aws-amplify

environment:
  sdk: ^3.11.0

dependencies:
  amplify_core: ">=2.13.0 <2.14.0"
  amplify_foundation_dart: ">=2.12.1 <2.13.0"
  amplify_foundation_dart_bridge: ">=2.11.2 <2.12.0"
  amplify_record_cache_dart: ">=0.1.2 <0.2.0"
  aws_common: ">=0.7.15 <0.8.0"
  aws_signature_v4: ">=0.6.12 <0.7.0"
  built_collection: ^5.1.1
  built_value: ^8.10.1
  meta: ^1.16.0
  smithy: ">=0.7.12 <0.8.0"
  smithy_aws: ">=0.7.12 <0.8.0"

dev_dependencies:
  amplify_lints: ">=3.1.6 <3.2.0"
  build_runner: ^2.4.15
  build_version: ^2.1.1
  # drift is a dev dependency because it's only needed for tests
  # (NativeDatabase.memory()). Runtime drift comes transitively via
  # amplify_record_cache_dart.
  drift: ^2.34.0
  fake_async: ^1.3.0
  mocktail: ^1.0.0
  test: ^1.22.1
